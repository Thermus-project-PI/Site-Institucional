<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../styles/style.css">
    <title>Login</title>
</head>

<body>
    <div class="container">
        <div class="content">
           <a href="../../index.html"><img src="../../img/seta.png" class="seta"></a>
            <div class="logo">
                <img src="../../img/logo.png" alt="Logo Thermus">
                <img src="../../img/THERMUS.png">
            </div>
            <div class="campos" >
                <input type="text" class="campo" placeholder="Email" id="InEmail">
                <p style="display: none; color: red;" id="emailIn">Email Inválido</p>
                <input type="password" class="campo" placeholder="Senha" id="InSenha">
                <p style="display: none; color: red;" id="senhaIn">Senha Inválida</p>
                <p class="mensagem">Esqueceu sua senha?<a href="/src/auth/"> Clique aqui</a></p>
                <button class="botao" onclick="validar()">Entrar</button>
                <p class="mensagem">Ainda não possui uma conta?  <a href="/src/auth/museu/cadastroMuseu.html">Cadastre-se</a></p>
                <div id="div_mensagem" class="aviso"></div> 
            </div>
                
    </div>
</body>

</html>
<script>
async function login(){
    let email = InEmail.value
    let senha = InSenha.value

    try {
        const res = await fetch('./dados.json')
        const data = await res.json()
        if(!res.ok){
            throw new Error();
        }

            let exists = data.some(user => user.email == email && user.senha == senha)
            if(exists){
                div_mensagem.innerText = "Usuário encontrado, redirecionando"
                setTimeout(div_mensagem.innerText += ".", 1000)
                setTimeout(div_mensagem.innerText += ".", 1500)
                setTimeout(div_mensagem.innerText += ".", 2000)
                setTimeout(window.location.href = '../../dashboard/index.html', 3000)
            }else{
                InEmail.value = ''
                InSenha.value = ''
                div_mensagem.innerHTML = "<p style='color: red;'>Usuário não encontrado!!, Tente Novamente</p>"
            }

    } catch (err) {
        console.log(err)
    }
 
}

function validar() {
    let email = InEmail.value;
    let senha = InSenha.value;

    let posArroba = email.indexOf('@');
    let posCom = email.indexOf('.com');

     if (email == '') {
        InEmail.style.border = "solid red 3px";
        InEmail.style.color = "color: rgba(255, 0, 0, 0.389)";
        emailIn.style.display = "block"
        return;
    }else{
        InSenha.style.border = "none"
        senhaIn.style.display = "none"
    }if(
        posArroba <= 0 || 
        posCom <= posArroba + 1 || 
        posCom != email.length - 4
    ) {
        InEmail.style.border = "solid red 3px";
        InEmail.style.color = "color: rgba(255, 0, 0, 0.389)";
        emailIn.style.display = "block"
        return;
    }else{
        InEmail.style.border = "none";
        emailIn.style.display = "none";

    }if(senha == '') {
        InSenha.style.border = "solid red 3px";
        InSenha.style.color = "color: rgba(255, 0, 0, 0.389)";
        senhaIn.style.display = "none";
        return;
        
    }else{
        InSenha.style.border = "none";
        senhaIn.style.display = "none";
    }

    div_mensagem.innerHTML = 'Login válido';
    login()
}
</script>
